<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Spark Theme Thumbnail</title>
<style>
    * {
        box-sizing: border-box;
    }

    html,
    body {
        width: 600px;
        height: 450px;
        margin: 0;
        overflow: hidden;
    }

    body {
        background: #eef3f7;
        color: #0f1b34;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .frame {
        position: relative;
        width: 600px;
        height: 450px;
        overflow: hidden;
        background:
            radial-gradient(circle at 50% 5%, rgb(255 255 255 / 92%), transparent 48%),
            linear-gradient(180deg, #f6fafc 0%, #e8f0f5 100%);
    }

    .theme-shot {
        position: absolute;
        left: 40px;
        top: 24px;
        width: 520px;
        height: 392px;
        overflow: hidden;
        background: #fff;
        border: 1px solid #d7e1eb;
        border-radius: 8px;
        box-shadow: 0 28px 70px rgb(24 38 57 / 18%);
    }

    .promo {
        height: 16px;
        display: grid;
        place-items: center;
        color: #083325;
        background: #b7f0b2;
        font-size: 6px;
        font-weight: 850;
        letter-spacing: 0.08em;
        text-transform: uppercase;
    }

    .nav {
        height: 42px;
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        padding: 0 20px;
        border-bottom: 1px solid #e3eaf1;
        background: #fff;
    }

    .brand {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #0f1b34;
        font-size: 13px;
        font-weight: 850;
        letter-spacing: -0.02em;
    }

    .bolt {
        width: 16px;
        height: 22px;
        background: #f5b21b;
        clip-path: polygon(56% 0, 10% 54%, 45% 54%, 32% 100%, 90% 37%, 53% 37%);
    }

    .links {
        display: flex;
        gap: 28px;
        color: #0f1b34;
        font-size: 7px;
        font-weight: 760;
        letter-spacing: 0.02em;
    }

    .icons {
        display: flex;
        justify-content: flex-end;
        gap: 12px;
    }

    .icons i {
        display: block;
        width: 12px;
        height: 12px;
        border: 1.6px solid #0f1b34;
        border-radius: 50%;
    }

    .icons i:nth-child(2) {
        width: 10px;
        border-radius: 6px 6px 3px 3px;
    }

    .hero {
        display: grid;
        grid-template-columns: 1fr 236px;
        gap: 22px;
        height: 188px;
        padding: 20px 28px 0;
    }

    .hero-copy {
        padding-top: 10px;
    }

    .pill {
        width: 112px;
        height: 18px;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 11px;
        border-radius: 999px;
        background: #f4f6f8;
    }

    .pill i {
        width: 28px;
        height: 10px;
        border-radius: 999px;
        background: #0f1b34;
    }

    .pill span {
        width: 52px;
        height: 5px;
        border-radius: 999px;
        background: #0f1b34;
    }

    .headline {
        width: 210px;
        height: 15px;
        margin-top: 15px;
        border-radius: 999px;
        background: #0f1b34;
        box-shadow:
            0 21px 0 #0f1b34,
            0 42px 0 #0f1b34;
    }

    .subcopy {
        width: 220px;
        height: 6px;
        margin-top: 61px;
        border-radius: 999px;
        background: #536174;
        box-shadow: 0 12px 0 #536174;
    }

    .proof {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 23px;
    }

    .avatars {
        display: flex;
    }

    .avatars i {
        width: 14px;
        height: 14px;
        margin-right: -4px;
        border: 1px solid #fff;
        border-radius: 50%;
        background: linear-gradient(135deg, #f5d29d, #7f8c8d);
    }

    .proof-line {
        width: 76px;
        height: 5px;
        border-radius: 999px;
        background: #0f1b34;
    }

    .stock {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #24b36b;
    }

    .cta {
        width: 178px;
        height: 28px;
        margin-top: 12px;
        display: grid;
        place-items: center;
        border: 1px solid #e2a400;
        border-radius: 6px;
        background: #ffd833;
        box-shadow: inset 0 -2px 0 rgb(160 118 0 / 18%);
    }

    .cta::before {
        content: "";
        width: 82px;
        height: 7px;
        border-radius: 999px;
        background: #0f1b34;
    }

    .hero-image {
        position: relative;
        height: 168px;
        overflow: hidden;
        border-radius: 8px;
        background: #f3f5f6;
    }

    .hero-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: 50% 8%;
        display: block;
    }

    .section {
        padding-top: 8px;
        text-align: center;
    }

    .section-pill {
        width: 86px;
        height: 19px;
        margin: 0 auto 8px;
        border-radius: 999px;
        background: #f5f7f9;
        position: relative;
    }

    .section-pill::before {
        content: "";
        position: absolute;
        left: 18px;
        top: 7px;
        width: 50px;
        height: 5px;
        border-radius: 999px;
        background: #0f1b34;
    }

    .section-heading {
        width: 250px;
        height: 13px;
        margin: 0 auto;
        border-radius: 999px;
        background: #0f1b34;
        box-shadow: 0 19px 0 #0f1b34;
    }

    .products {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 18px;
        width: 286px;
        margin: 21px auto 0;
    }

    .card {
        position: relative;
        overflow: hidden;
        border: 1px solid #dfe7ef;
        border-radius: 4px;
        background: #fff;
        text-align: left;
    }

    .badge {
        position: absolute;
        right: 8px;
        top: 8px;
        width: 38px;
        height: 15px;
        z-index: 2;
        border-radius: 999px;
        background: #a9f19b;
    }

    .card-media {
        height: 82px;
        background: #f6f7f8;
    }

    .card-media img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
    }

    .card:first-child .card-media img {
        object-position: 24% 72%;
    }

    .card:nth-child(2) .card-media img {
        object-position: 78% 70%;
    }

    .card-meta {
        padding: 8px 10px 10px;
    }

    .card-meta::before {
        content: "";
        display: block;
        width: 58px;
        height: 5px;
        margin-bottom: 8px;
        border-radius: 999px;
        background: #687487;
    }

    .card-meta::after {
        content: "";
        display: block;
        width: 82px;
        height: 8px;
        border-radius: 999px;
        background: #0f1b34;
        box-shadow: 0 15px 0 #0f1b34;
    }

    .shadow {
        position: absolute;
        left: 96px;
        right: 96px;
        bottom: 12px;
        height: 5px;
        border-radius: 999px;
        background: rgb(112 128 144 / 18%);
        filter: blur(3px);
    }
</style>
</head>
<body>
<main class="frame" aria-label="Spark theme thumbnail">
    <section class="theme-shot" aria-label="Condensed Spark storefront layout">
        <div class="promo">Up to 50% off when you order today</div>
        <nav class="nav" aria-label="Demo storefront navigation">
            <div class="brand"><span class="bolt"></span><span>Spark</span></div>
            <div class="links"><span>Home</span><span>Shop</span><span>Support</span></div>
            <div class="icons"><i></i><i></i></div>
        </nav>

        <section class="hero">
            <div class="hero-copy">
                <div class="pill"><i></i><span></span></div>
                <div class="headline"></div>
                <div class="subcopy"></div>
                <div class="proof">
                    <div class="avatars"><i></i><i></i><i></i></div>
                    <div class="proof-line"></div>
                    <div class="stock"></div>
                </div>
                <div class="cta"></div>
            </div>
            <div class="hero-image">
                <img src="source-gadget.jpg" alt="">
            </div>
        </section>

        <section class="section">
            <div class="section-pill"></div>
            <div class="section-heading"></div>
            <div class="products">
                <article class="card">
                    <div class="badge"></div>
                    <div class="card-media"><img src="source-gadget.jpg" alt=""></div>
                    <div class="card-meta"></div>
                </article>
                <article class="card">
                    <div class="badge"></div>
                    <div class="card-media"><img src="source-gadget.jpg" alt=""></div>
                    <div class="card-meta"></div>
                </article>
            </div>
        </section>
    </section>
    <div class="shadow" aria-hidden="true"></div>
</main>
</body>
</html>
