name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify theme tooling
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Validate GitHub YAML
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          for path in sorted(Path(".github").glob("**/*.yml")):
              with path.open() as handle:
                  yaml.safe_load(handle)
              print(f"OK: {path}")
          PY

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Run JavaScript module tests
        run: |
          for test_file in tests/js/*.test.js; do
            node "$test_file"
          done

      - name: Check committed CSS compatibility
        run: python scripts/sass-compat.py --check assets/main.css

      - name: Read Tailwind CSS version
        id: tailwind
        run: |
          version="$(awk '$1 == "TAILWIND_VERSION" && ($2 == "=" || $2 == ":=") { version = $3 } END { print version }' Makefile)"
          test -n "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Tailwind CSS CLI
        uses: actions/cache@v4
        with:
          path: tailwindcss
          key: tailwind-${{ steps.tailwind.outputs.version }}-linux-x64

      - name: Install Tailwind CSS CLI
        run: |
          expected_version="${{ steps.tailwind.outputs.version }}"

          validate_tailwind() {
            if [ ! -x ./tailwindcss ]; then
              return 1
            fi

            output="$(./tailwindcss --help 2>&1)" || return 1
            banner="${output%%$'\n'*}"
            # Strip ANSI color/style escape sequences: the CLI colorizes its
            # banner on CI runners, which breaks plain string matching.
            banner="$(printf '%s' "$banner" | sed $'s/\x1b\\[[0-9;]*m//g')"
            echo "Tailwind CLI banner: $banner"
            case " $banner " in
              *" $expected_version "*) return 0 ;;
              *) return 1 ;;
            esac
          }

          if [ -f ./tailwindcss ]; then
            chmod +x ./tailwindcss
          fi

          if ! validate_tailwind; then
            echo "Cached Tailwind CLI is missing or has the wrong version."
            rm -f ./tailwindcss
            make install-tailwind
          fi

          validate_tailwind

      - name: CSS drift gate
        run: make css-drift

      - name: Settings parity gate
        run: python scripts/check-settings-parity.py

      - name: Template integrity gate
        run: python scripts/check-templates.py
