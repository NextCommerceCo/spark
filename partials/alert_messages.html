{# Spark Theme — Flash/Alert Messages #}
<div id="messages">
{% if messages %}
    {% for message in messages %}
    <div class="p-4 mb-4 text-sm {% if 'error' in message.tags %}text-red-800 bg-red-50 border border-red-200{% elif 'success' in message.tags %}text-green-800 bg-green-50 border border-green-200{% elif 'warning' in message.tags %}text-amber-800 bg-amber-50 border border-amber-200{% else %}text-slate-800 bg-slate-50 border border-slate-200{% endif %}" role="alert">
        {% if 'safe' in message.tags %}
            {{ message|safe }}
        {% else %}
            {{ message }}
        {% endif %}
    </div>
    {% endfor %}
{% endif %}
</div>
