{# Shared section heading helper. Expects heading, size, and align. #}
{% if heading %}
<h2 class="{% if size == 'large' %}text-3xl md:text-4xl{% elif size == 'small' %}text-xl{% else %}text-2xl{% endif %} font-semibold text-slate-800 mb-8 {% if align == 'center' %}text-center{% elif align == 'right' %}text-right{% endif %}">
    {{ heading }}
</h2>
{% endif %}
