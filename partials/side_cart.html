{# Spark Theme — Side Cart (uses platform-provided side cart JS) #}
{% load static %}

<form id="side_cart_formset">
    <div class="sidecart" id="cart-modal" tabindex="-1" role="dialog" aria-label="Shopping cart" aria-modal="true">
        <div class="sidecart-dialog" role="document">
            <div class="sidecart-content" id="cart-content"></div>
        </div>
    </div>
</form>

<script src="{% static 'shop/js/jscookie.js' %}"></script>
<script src="{% static 'shop/js/cart.js' %}"></script>

<script>
    const SIDECART_MSGS = {
        'your_order': "{% t 'side_cart.default.your_order' %}",
        'your_cart_is_empty': "{% t 'side_cart.default.your_cart_is_empty' %}",
        'oops_You_have_nothing_here': "{% t 'side_cart.default.oops_You_have_nothing_here' %}",
        'quantity': "{% t 'side_cart.default.quantity' %}",
        'qty': "{% t 'side_cart.default.qty' %}",
        'schedule': "{% t 'side_cart.default.schedule' %}",
        'price': "{% t 'side_cart.default.price' %}",
        'savings': "{% t 'side_cart.default.savings' %}",
        'regular': "{% t 'side_cart.default.regular' %}",
        'your_price': "{% t 'side_cart.default.your_price' %}",
        'cart_subtotal': "{% t 'side_cart.default.cart_subtotal' %}",
        'discount': "{% t 'side_cart.default.discount' %}",
        'shipping': "{% t 'side_cart.default.shipping' %}",
        'cart': "{% t 'side_cart.default.cart' %}",
        'total': "{% t 'side_cart.default.total' %}",
        'product': "{% t 'side_cart.default.product' %}",
        'subscription_details': "{% t 'side_cart.default.subscription_details' %}",
        'applied_coupons': "{% t 'side_cart.default.applied_coupons' %}",
        'subscription_items_one': "{% t 'side_cart.default.subscription_items_one' with count=1 %}",
        'subscription_items_other': "{% t 'side_cart.default.subscription_items_other' with count=2 %}",
        'calculated_at_checkout': "{% t 'side_cart.default.calculated_at_checkout' %}",
        'subscription_total': "{% t 'side_cart.default.subscription_total' %}",
        'subscription_renewal_message': "{% t 'side_cart.default.subscription_renewal_message' %}",
        'proceed_to_checkout': "{% t 'side_cart.default.proceed_to_checkout' %}",
        'have_a_coupon': "{% t 'side_cart.default.have_a_coupon' %}",
        'coupon_code': "{% t 'side_cart.default.coupon_code' %}",
        'apply_coupon': "{% t 'side_cart.default.apply_coupon' %}"
    };
</script>
<script src="{% static 'shop/js/side_cart.js' %}"></script>

<script>
    var sidecart_options = {
        modal_open: {% if modal_open %} true {% else %} false {% endif %},
        graphql_url: "{% url 'storefrontapi:graphql' %}",
        max_cart_quantity_per_line: {{ max_cart_quantity_per_line|default:"15" }},
        SIDECART_MSGS: SIDECART_MSGS
    };
    sidecart.init(sidecart_options);

    // Side cart open/close helpers
    function sparkOpenSideCart() {
        var modal = document.getElementById('cart-modal');
        if (!modal) return;
        if (typeof sidecart !== 'undefined' && sidecart.basket && sidecart.basket.reloadBasketData) {
            sidecart.basket.reloadBasketData();
        }
        modal.classList.add('show');
        document.body.classList.add('sidecart-open');
    }

    function sparkCloseSideCart() {
        var modal = document.getElementById('cart-modal');
        if (!modal) return;
        modal.classList.remove('show');
        document.body.classList.remove('sidecart-open');
    }

    function sparkIsSideCartOpen() {
        var modal = document.getElementById('cart-modal');
        return modal && modal.classList.contains('show');
    }

    // Handle data-dismiss="side-cart" clicks (platform renders this, expects Bootstrap JS)
    document.addEventListener('click', function(e) {
        var btn = e.target.closest('[data-dismiss="side-cart"]');
        if (btn) sparkCloseSideCart();
    });

    // Also close on Escape key
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && sparkIsSideCartOpen()) sparkCloseSideCart();
    });

    // Also close on backdrop click (click on .sidecart outside .sidecart-dialog)
    var cartModal = document.getElementById('cart-modal');
    if (cartModal) {
        cartModal.addEventListener('click', function(e) {
            if (e.target === cartModal) sparkCloseSideCart();
        });
    }

    // Spark integration: when Web Components add to cart via GraphQL,
    // refresh the platform side cart and optionally open it.
    var sparkSidecartOpenOnAdd = true;
    window.sparkSidecartOpenOnAdd = sparkSidecartOpenOnAdd;

    // Watch the add-to-cart button for success state change.
    // This is more reliable than CustomEvents when third-party scripts
    // modify addEventListener or fetch.
    (function() {
        var btn = document.getElementById('add-to-cart-btn');
        if (!btn) return;

        var _scTriggered = false;
        var observer = new MutationObserver(function() {
            // Detect success state by checking button text for "Added"
            var text = btn.textContent || '';
            if (!_scTriggered && text.indexOf('Added') !== -1) {
                _scTriggered = true;
                if (sparkSidecartOpenOnAdd) {
                    sparkOpenSideCart();
                } else if (typeof sidecart !== 'undefined' && sidecart.basket && sidecart.basket.reloadBasketData) {
                    sidecart.basket.reloadBasketData();
                }
                // Reset flag after success duration
                setTimeout(function() { _scTriggered = false; }, 3000);
            }
        });

        observer.observe(btn, { childList: true, subtree: true });
    })();

    // Listen for spark:cart:toggle event (from header cart icon or other sources)
    document.addEventListener('spark:cart:toggle', function() {
        if (sparkIsSideCartOpen()) {
            sparkCloseSideCart();
        } else {
            sparkOpenSideCart();
        }
    });
</script>
