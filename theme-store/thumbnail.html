<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Spark Theme Thumbnail</title>
<style>
    * {
        box-sizing: border-box;
    }

    html,
    body {
        width: 600px;
        height: 450px;
        margin: 0;
        overflow: hidden;
    }

    body {
        background: #eef3f7;
        color: #172033;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .frame {
        position: relative;
        width: 600px;
        height: 450px;
        overflow: hidden;
        background:
            radial-gradient(circle at 20% 10%, rgb(255 255 255 / 88%), transparent 38%),
            linear-gradient(180deg, #f7fafc 0%, #e9f0f5 100%);
    }

    .theme-shot {
        position: absolute;
        left: 43px;
        top: 26px;
        width: 514px;
        height: 386px;
        overflow: hidden;
        background: #fff;
        border: 1px solid #d9e2eb;
        border-radius: 8px;
        box-shadow: 0 28px 70px rgb(24 38 57 / 18%);
    }

    .store {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: 50% 0%;
    }

    .store-chrome {
        position: absolute;
        inset: 0;
        pointer-events: none;
        box-shadow: inset 0 0 0 1px rgb(255 255 255 / 42%);
    }

    .spark-nav {
        position: absolute;
        left: 0;
        right: 0;
        top: 0;
        height: 42px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 18px 0 17px;
        background: rgb(255 255 255 / 92%);
        border-bottom: 1px solid rgb(23 32 51 / 8%);
        backdrop-filter: blur(10px);
    }

    .brand {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #143522;
        font-size: 11px;
        font-weight: 760;
        letter-spacing: 0.18em;
        text-transform: uppercase;
    }

    .bolt {
        width: 15px;
        height: 21px;
        background: #f5b21b;
        clip-path: polygon(56% 0, 10% 54%, 45% 54%, 32% 100%, 90% 37%, 53% 37%);
    }

    .nav-links {
        display: flex;
        align-items: center;
        gap: 17px;
        color: rgb(20 32 51 / 64%);
        font-size: 7px;
        font-weight: 720;
        letter-spacing: 0.14em;
        text-transform: uppercase;
    }

    .nav-icons {
        display: flex;
        align-items: center;
        gap: 9px;
    }

    .nav-icons i {
        display: block;
        width: 10px;
        height: 10px;
        border: 1.4px solid #172033;
        border-radius: 50%;
        opacity: 0.78;
    }

    .nav-icons i:nth-child(2) {
        width: 9px;
        height: 11px;
        border-radius: 5px 5px 3px 3px;
    }

    .hero-copy {
        position: absolute;
        left: 24px;
        top: 92px;
        width: 168px;
        padding: 16px 17px 15px;
        background: rgb(255 255 255 / 83%);
        border: 1px solid rgb(255 255 255 / 70%);
        box-shadow: 0 18px 42px rgb(24 38 57 / 12%);
        backdrop-filter: blur(12px);
    }

    .eyebrow {
        width: 54px;
        height: 5px;
        margin-bottom: 10px;
        border-radius: 999px;
        background: #143522;
    }

    .headline {
        width: 124px;
        height: 9px;
        border-radius: 999px;
        background: #172033;
        box-shadow:
            0 15px 0 #172033,
            0 30px 0 rgb(23 32 51 / 38%);
    }

    .cta {
        width: 66px;
        height: 19px;
        margin-top: 47px;
        border-radius: 999px;
        background: #143522;
    }

    .collection-strip {
        position: absolute;
        left: 21px;
        right: 21px;
        bottom: 18px;
        height: 86px;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
    }

    .collection {
        position: relative;
        overflow: hidden;
        border: 1px solid rgb(255 255 255 / 60%);
        background: rgb(255 255 255 / 70%);
        box-shadow: 0 14px 32px rgb(24 38 57 / 10%);
        backdrop-filter: blur(12px);
    }

    .collection::before {
        content: "";
        position: absolute;
        left: 13px;
        right: 13px;
        top: 15px;
        height: 40px;
        border-radius: 5px;
        background:
            linear-gradient(145deg, rgb(255 255 255 / 80%), rgb(224 213 198 / 80%)),
            #f5efe8;
    }

    .collection::after {
        content: "";
        position: absolute;
        left: 13px;
        bottom: 13px;
        width: 55px;
        height: 5px;
        border-radius: 999px;
        background: #172033;
        box-shadow: 0 10px 0 #d5bfa5;
    }

    .store-depth {
        position: absolute;
        left: 88px;
        right: 88px;
        bottom: 11px;
        height: 5px;
        border-radius: 0 0 999px 999px;
        background: rgb(112 128 144 / 20%);
        filter: blur(3px);
    }
</style>
</head>
<body>
<main class="frame" aria-label="Spark theme store thumbnail">
    <section class="theme-shot" aria-label="Realistic Spark demo storefront">
        <img class="store" src="source-wellness.jpg" alt="">
        <div class="store-chrome"></div>

        <nav class="spark-nav" aria-label="Demo storefront navigation">
            <div class="brand"><span class="bolt"></span><span>Spark</span></div>
            <div class="nav-links"><span>Shop</span><span>Rituals</span><span>Journal</span></div>
            <div class="nav-icons"><i></i><i></i></div>
        </nav>

        <div class="hero-copy" aria-hidden="true">
            <div class="eyebrow"></div>
            <div class="headline"></div>
            <div class="cta"></div>
        </div>

        <div class="collection-strip" aria-hidden="true">
            <div class="collection"></div>
            <div class="collection"></div>
            <div class="collection"></div>
            <div class="collection"></div>
        </div>
    </section>
    <div class="store-depth" aria-hidden="true"></div>
</main>
</body>
</html>
